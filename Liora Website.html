function goSlide(i) {
  state.slide = ((i % 3) + 3) % 3;
  document.querySelectorAll('.slide').forEach(s => {
    s.classList.toggle('active', +s.dataset.slide === state.slide);
  });
  document.querySelectorAll('[data-dot]').forEach(d => {
    d.classList.toggle('bg-white', +d.dataset.dot === state.slide);
    d.classList.toggle('bg-white/60', +d.dataset.dot !== state.slide);
  });
}
window.goSlide = goSlide;

}, 5000);

function toggleWish(slug) {
  state.wishlist = state.wishlist || [];
  const i = state.wishlist.indexOf(slug);
  if (i >= 0) { state.wishlist.splice(i, 1); toast('💔 Đã bỏ yêu thích'); }
  else { state.wishlist.push(slug); toast('💖 Đã thêm vào yêu thích'); }
  localStorage.setItem('liora_wishlist', JSON.stringify(state.wishlist));
  render();
}
window.toggleWish = toggleWish;

function productGrid(items) {
  if (!items || items.length === 0) {
    return `<div class="text-center text-mute py-12">Chưa có sản phẩm nào trong danh mục này.</div>`;
  }
  return `<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-5">
    ${items.map(productCard).join('')}
  </div>`;
}

function quickAdd(slug) {
  const p = findProduct(slug);
  if (!p) return;
  if (p.sold) { toast('⚠ Sản phẩm tạm hết hàng'); return; }
  const cartId = `${slug}__default`;
  const existing = state.cart.find(i => i.cartId === cartId);
  if (existing) existing.qty += 1;
  else state.cart.push({ cartId, slug, name: p.name, price: p.price, qty: 1, tint: p.tint, tint2: p.tint2, accent: p.accent, shape: p.shape });
  saveCart();
  toast(`✓ Đã thêm "${p.name.slice(0, 30)}..." vào giỏ`);
  renderHeader();
}
window.quickAdd = quickAdd;

  return `

function setPdpImage(i) { state.pdpImageIdx = i; render(); }
function setPdpSize(s) { state.pdpSize = s; render(); }
function setPdpQty(q) { state.pdpQty = Math.max(1, Math.min(20, q)); render(); }
window.setPdpImage = setPdpImage; window.setPdpSize = setPdpSize; window.setPdpQty = setPdpQty;

function addToCartFromPdp(slug) {
  const p = findProduct(slug);
  if (!p || p.sold) { toast('⚠ Sản phẩm tạm hết hàng'); return; }
  const cartId = `${slug}__${state.pdpSize}`;
  const existing = state.cart.find(i => i.cartId === cartId);
  if (existing) existing.qty += state.pdpQty;
  else state.cart.push({ cartId, slug, name: p.name, price: p.price, qty: state.pdpQty, size: state.pdpSize, tint: p.tint, tint2: p.tint2, accent: p.accent, shape: p.shape });
  saveCart();
  toast(`✓ Đã thêm vào giỏ hàng`);
  state.pdpQty = 1;
  render();
  setTimeout(openCart, 250);
}
window.addToCartFromPdp = addToCartFromPdp;

// ─────────────────────────────────────────────────────────
// CART DRAWER
// ─────────────────────────────────────────────────────────
function renderCartDrawer() {
  const cart = state.cart;
  const subtotal = cart.reduce((s,i) => s + i.price * i.qty, 0);
  const body = document.getElementById('cartBody');
  const foot = document.getElementById('cartFoot');
  const lbl  = document.getElementById('cartCountLabel');
  if (lbl) lbl.textContent = cart.length > 0 ? `(${cart.length})` : '';

  if (cart.length === 0) {
    body.innerHTML = `
      <div class="flex flex-col items-center justify-center text-center px-6 py-16 h-full">
        <div class="text-6xl mb-5">🛒</div>
        <h3 class="font-bold text-lg mb-2">Giỏ hàng trống</h3>
        <p class="text-ink2 mb-6 text-sm">Hãy chọn sản phẩm yêu thích nhé!</p>
        <button class="btn-pink" onclick="closeAll(); navigate('/shop')">Khám phá →</button>
      </div>`;
    foot.innerHTML = '';
    return;
  }

  body.innerHTML = `<div class="divide-y divide-rule">
    ${cart.map(it => `
      <div class="p-4 flex gap-3">
        <div class="w-20 h-20 rounded-lg overflow-hidden flex-shrink-0">
          <div class="photo h-full w-full" style="--p-tint:${it.tint}; --p-tint2:${it.tint2}; --p-accent:${it.accent}; aspect-ratio:auto;">
            <div class="sil">${SHAPES[it.shape] || SHAPES.gem}</div>
          </div>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium line-clamp-2 mb-1">${it.name}</div>
          ${it.size ? `<div class="text-xs text-mute mb-2">Size: ${it.size}</div>` : '<div class="mb-2"></div>'}
          <div class="flex items-center justify-between">
            <div class="flex items-center border border-rule rounded-full overflow-hidden text-sm">
              <button class="px-2 py-1 hover:bg-brand-50" onclick="updateCartQty('${it.cartId}', ${it.qty - 1})">−</button>
              <span class="px-2 min-w-[24px] text-center">${it.qty}</span>
              <button class="px-2 py-1 hover:bg-brand-50" onclick="updateCartQty('${it.cartId}', ${it.qty + 1})">+</button>
            </div>
            <div class="font-bold text-brand-500">${fmt(it.price * it.qty)}</div>
          </div>
          <button class="text-xs text-mute hover:text-brand-500 mt-2" onclick="removeCartItem('${it.cartId}')">✕ Xoá</button>
        </div>
      </div>
    `).join('')}</div>`;

  foot.innerHTML = `
    <div class="flex justify-between text-sm mb-1"><span class="text-ink2">Tạm tính</span><span>${fmt(subtotal)}</span></div>
    <div class="flex justify-between font-bold mb-4"><span>TỔNG TIỀN</span><span class="text-brand-500 text-xl">${fmt(subtotal)}</span></div>
    <div class="grid grid-cols-2 gap-2">
      <button class="btn-outline justify-center" onclick="closeAll(); navigate('/cart-view')">Xem giỏ hàng</button>
      <button class="btn-pink justify-center" onclick="closeAll(); navigate('/checkout')">Thanh toán</button>
    </div>
  `;
}
function updateCartQty(cid, q) {
  if (q < 1) return removeCartItem(cid);
  const it = state.cart.find(i => i.cartId === cid);
  if (it) { it.qty = Math.min(20, q); saveCart(); renderHeader(); renderCartDrawer(); }
}
function removeCartItem(cid) { state.cart = state.cart.filter(i => i.cartId !== cid); saveCart(); renderHeader(); renderCartDrawer(); }
window.updateCartQty = updateCartQty; window.removeCartItem = removeCartItem;

// ─────────────────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────────────────
function renderSearch(q) {
  const c = document.getElementById('searchResults');
  if (!q.trim()) {
    c.innerHTML = `
      <div class="text-xs text-mute mb-3 uppercase tracking-wider">Tìm kiếm phổ biến</div>
      <div class="flex gap-2 flex-wrap">
        ${['Moissanite','Bông tai','Dây chuyền','Lắc tay','Nhẫn đôi','Cỏ 4 lá'].map(t =>
          `<button class="chip" onclick="document.getElementById('searchInput').value='${t}'; renderSearch('${t}')">${t}</button>`
        ).join('')}
      </div>`;
    return;
  }
  const tl = q.toLowerCase();
  const r = PRODUCTS.filter(p => p.name.toLowerCase().includes(tl) || p.code.toLowerCase().includes(tl) || p.subcat.includes(tl));
  if (r.length === 0) {
    c.innerHTML = `<div class="text-center py-10 text-mute">Không tìm thấy "${q}"</div>`;
    return;
  }
  c.innerHTML = `<div class="text-xs text-mute mb-3 uppercase tracking-wider">${r.length} kết quả</div>
    <div class="divide-y divide-rule">${r.map(p => `
      <a href="#/product/${p.slug}" onclick="closeAll(); navigate('/product/${p.slug}')" class="flex items-center gap-3 py-3 hover:bg-brand-50 px-2 -mx-2 rounded-lg">
        <div class="w-14 h-14 rounded-lg overflow-hidden flex-shrink-0">
          <div class="photo h-full w-full" style="--p-tint:${p.tint}; --p-tint2:${p.tint2}; --p-accent:${p.accent}; aspect-ratio:auto;">
            <div class="sil">${SHAPES[p.shape] || SHAPES.gem}</div>
          </div>
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium line-clamp-1">${p.name}</div>
          <div class="text-xs text-mute">Mã: ${p.code}</div>
        </div>
        <div class="font-bold text-brand-500 text-sm whitespace-nowrap">${fmt(p.price)}</div>
      </a>
    `).join('')}</div>`;
}

// ─────────────────────────────────────────────────────────
// DRAWER CONTROLS
// ─────────────────────────────────────────────────────────
function openCart() { renderCartDrawer(); document.getElementById('cartDrawer').classList.add('open'); document.getElementById('scrim').classList.add('open'); document.body.style.overflow = 'hidden'; }
function openSearch() { renderSearch(''); document.getElementById('searchPanel').classList.add('open'); document.getElementById('scrim').classList.add('open'); document.body.style.overflow = 'hidden'; setTimeout(() => document.getElementById('searchInput').focus(), 100); }
function openVoucher() { document.getElementById('voucher').classList.add('open'); document.getElementById('scrim').classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeVoucher() { document.getElementById('voucher').classList.remove('open'); document.getElementById('scrim').classList.remove('open'); document.body.style.overflow = ''; }
function closeAll() {
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('searchPanel').classList.remove('open');
  document.getElementById('voucher').classList.remove('open');
  document.getElementById('scrim').classList.remove('open');
  document.body.style.overflow = '';
}
function doInlineSearch() { const q = document.getElementById('inlineSearch').value.trim(); if (q) { openSearch(); document.getElementById('searchInput').value = q; renderSearch(q); } else openSearch(); }
window.doInlineSearch = doInlineSearch;
window.openCart = openCart; window.openSearch = openSearch; window.openVoucher = openVoucher; window.closeVoucher = closeVoucher; window.closeAll = closeAll;

// Voucher auto-show
if (!localStorage.getItem('liora_voucher_seen')) {
  setTimeout(() => {
    openVoucher();
    localStorage.setItem('liora_voucher_seen', '1');
  }, 6000);
}

// ─────────────────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────────────────
let toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2500);
}
window.toast = toast;

// ─────────────────────────────────────────────────────────
// ROUTING
// ─────────────────────────────────────────────────────────
function parseHash() { return location.hash.replace(/^#/, '') || '/'; }
function navigate(p) { location.hash = p; }
window.navigate = navigate;

window.addEventListener('hashchange', () => {
  state.route = parseHash();
  state.pdpImageIdx = 0; state.pdpQty = 1; state.pdpSize = null;
  render();
  window.scrollTo({ top: 0, behavior: 'instant' });
});

function renderHeader() {
  const wrap = document.querySelector('#app header');
  if (wrap) wrap.outerHTML = header();
}

function render() {
  const route = state.route;
  let content = '';
  if (route === '/' || route === '') content = homePage();
  else if (route === '/shop') content = shopPage();
  else if (route.startsWith('/product/')) content = productPage(route.replace('/product/', ''));
  else if (route === '/checkout') content = checkoutPage();
  else if (route === '/about') content = aboutPage();
  else if (route === '/news') content = newsPage();
  else if (route === '/lien-he') content = contactPage();
  else if (route === '/kiem-dinh') content = simplePage('Kiểm Định', '<p>Tất cả các sản phẩm kim cương Moissanite của Liorajewelry đều được kiểm định bởi GRA (Gemological Research Association) — đảm bảo chất lượng, độ trong và độ lấp lánh tương đương kim cương thật.</p><p>Mỗi sản phẩm đi kèm thẻ kiểm định và bảo hành để khách hàng yên tâm sử dụng.</p>');
  else if (route === '/feedback') content = simplePage('Feedback', '<p>Cảm ơn các khách hàng đã tin tưởng và đồng hành cùng Liorajewelry. Mỗi feedback là động lực để chúng mình hoàn thiện hơn mỗi ngày 💖</p><p>Theo dõi fanpage Liorajewelry.shop để xem các đánh giá thực tế từ khách hàng.</p>');
  else if (route === '/huong-dan') content = simplePage('Hướng Dẫn', '<p><strong>Hướng dẫn chọn size nhẫn:</strong> Dùng một sợi chỉ quấn quanh ngón tay, đo chiều dài đoạn chỉ rồi đối chiếu bảng size.</p><p><strong>Hướng dẫn bảo quản:</strong> Tránh nước hoa, hoá chất; cất trong hộp khi không sử dụng; lau bằng vải mềm.</p><p><strong>Hướng dẫn đặt hàng:</strong> Chọn sản phẩm → Thêm vào giỏ → Thanh toán → Nhận hàng và kiểm tra trước khi trả tiền (COD).</p>');
  else if (route === '/cart-view') content = checkoutPage();
  else content = `<main class="page container-x py-20 text-center min-h-[50vh]">
    <h1 class="text-2xl font-bold mb-3">Không tìm thấy trang</h1>
    <a class="btn-pink" href="#/" onclick="event.preventDefault(); navigate('/')">← Về trang chủ</a>
  </main>`;
  document.getElementById('app').innerHTML = header() + content + footer();

  // Init slider dots state
  if (state.route === '/' || state.route === '') goSlide(state.slide);
}

document.getElementById('searchInput').addEventListener('input', e => renderSearch(e.target.value));
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAll(); });

state.route = parseHash();
render();
</script>
